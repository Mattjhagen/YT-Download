# Media Drop Samba Share Configuration

# 1. Install Samba: 
#    sudo apt install samba

# 2. Add this snippet to /etc/samba/smb.conf:

[MediaDrop]
   path = /srv/media-drop/library
   browseable = yes
   read only = yes
   guest ok = no
   create mask = 0755
   directory mask = 0755
   # Replace 'matt' with your actual username
   valid users = matt

# 3. Create a Samba password for your user:
#    sudo smbpasswd -a matt

# 4. Restart Samba service:
#    sudo systemctl restart smbd

# 5. Connect from macOS:
#    Finder -> Go -> Connect to Server -> smb://SERVER-IP/MediaDrop
