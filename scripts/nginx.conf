server {
    listen 80;
    server_name media.yourdomain.com; # Replace with your domain

    # Increase client body size for potentially larger metadata/uploads
    client_max_body_size 10G;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE and streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Optional: Serve library via Nginx directly for efficiency
    location /media/ {
        alias /srv/media-drop/library/;
        autoindex on;
        add_header Accept-Ranges bytes;
    }
}
