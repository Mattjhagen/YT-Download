<!DOCTYPE html>
<html>
<head>
  <title>FinchWire Options</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #0f172a; color: #f8fafc; min-width: 300px; }
    h2 { color: #3b82f6; margin-top: 0; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
    input { width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: white; box-sizing: border-box; }
    .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
    button:hover { background: #2563eb; }
    #status { margin-top: 15px; text-align: center; font-size: 13px; color: #10b981; }
  </style>
</head>
<body>
  <h2>🐦 FinchWire Settings</h2>
  <div class="field">
    <label for="serverUrl">FinchWire Server URL</label>
    <input type="text" id="serverUrl" placeholder="https://yt.finchwire.site">
    <div class="hint">The public domain of your Media Drop dashboard.</div>
  </div>
  <div class="field">
    <label for="serverPassword">Admin Password</label>
    <input type="password" id="serverPassword" placeholder="••••••••">
    <div class="hint">Your server's MEDIA_DROP_ADMIN_PASSWORD.</div>
  </div>
  <button id="save">Save Settings</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
